<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Format Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body data-desktop="{{ 1 if desktop_mode else 0 }}">
    <div class="backdrop"></div>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Web App di Conversione</p>
        <h1>Format Forge</h1>
        <p class="subtitle">
          Carica un file, scegli il formato di uscita e scarica il risultato in pochi secondi.
        </p>
      </header>

      <section class="panel">
        <form id="convert-form">
          <label for="file-input">File</label>
          <input id="file-input" name="file" type="file" required />
          <input id="source-format" name="source_format" type="hidden" value="auto" />
          <input id="target-format" name="target_format" type="hidden" value="" />

          <div class="format-dropdown">
            <button id="format-dropdown-toggle" class="format-dropdown-toggle" type="button" aria-expanded="false" aria-controls="format-dropdown-panel">
              Seleziona Formati
            </button>

            <div id="format-dropdown-panel" class="format-dropdown-panel hidden">
              <div class="format-tabs" role="tablist" aria-label="Categorie formati">
                <button type="button" class="format-tab active" data-tab="data" aria-selected="true">Dati e Testo</button>
                <button type="button" class="format-tab" data-tab="image" aria-selected="false">Immagini</button>
                <button type="button" class="format-tab" data-tab="media" aria-selected="false">Media</button>
              </div>

              <div class="format-table-shell">
                <table class="format-table">
                  <thead>
                    <tr><th>Formato</th><th>Sorgente</th><th>Destinazione</th></tr>
                  </thead>
                  <tbody id="format-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>

          <button id="submit-btn" type="submit">Converti e Scarica</button>
        </form>

        <p id="status" class="status" aria-live="polite"></p>
        <div id="after-download" class="after-download hidden">
          <button id="locate-btn" type="button">Locate file?</button>
          <p id="download-note" class="download-note"></p>
        </div>
      </section>
    </main>

    <section id="console-drawer" class="console-drawer" aria-hidden="true">
      <div id="console-resizer" class="console-resizer" title="Trascina per ridimensionare"></div>
      <div class="console-header">
        <strong>Console Integrata</strong>
        <div class="console-actions">
          <span class="console-hint">Ctrl+\ per mostrare/nascondere</span>
          <button id="console-clear" class="console-clear" type="button">Pulisci</button>
        </div>
      </div>
      <div id="console-output" class="console-output" aria-live="polite"></div>
    </section>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
