name: Build and Release EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path FormatForgeWeb.spec) { Remove-Item -Force FormatForgeWeb.spec }
          if (Test-Path FormatForgeDesktop.spec) { Remove-Item -Force FormatForgeDesktop.spec }

          $iconArg = @()
          if (Test-Path "assets/formatforge.ico") {
            $iconArg = @("--icon", "assets/formatforge.ico")
          }

          & pyinstaller --noconsole --onefile --name FormatForgeWeb @iconArg --add-data "templates;templates" --add-data "static;static" --collect-all imageio_ffmpeg app.py
          & pyinstaller --noconsole --onefile --name FormatForgeDesktop @iconArg --add-data "templates;templates" --add-data "static;static" --collect-all imageio_ffmpeg --collect-all webview desktop_app.py

      - name: Sign EXEs
        if: ${{ secrets.CODE_SIGN_CERT_BASE64 != '' && secrets.CODE_SIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        env:
          CODE_SIGN_CERT_BASE64: ${{ secrets.CODE_SIGN_CERT_BASE64 }}
          CODE_SIGN_CERT_PASSWORD: ${{ secrets.CODE_SIGN_CERT_PASSWORD }}
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\sign-executables.ps1 -Targets @("dist/FormatForgeWeb.exe", "dist/FormatForgeDesktop.exe")

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FormatForge-${{ github.ref_name }}
          path: |
            dist/FormatForgeWeb.exe
            dist/FormatForgeDesktop.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FormatForgeWeb.exe
            dist/FormatForgeDesktop.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
